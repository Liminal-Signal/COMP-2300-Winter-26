name: Notify Liminal Signal

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch comp2300-updated event
        env:
          TOKEN: ${{ secrets.LIMINAL_SIGNAL_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/Liminal-Signal/liminal-signal.github.io/dispatches \
            -d @- <<'JSON'
          {
            "event_type": "comp2300-updated",
            "client_payload": {
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          JSON
